[package]
name = "academiq-research-tauri"
version = "1.1.8"
description = "AcademiQ Research Tauri shell"
authors = ["AcademiQ"]
license = "MIT"
repository = ""
edition = "2021"

[lib]
name = "academiq_research_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
