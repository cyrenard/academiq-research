name: CI

on:
  push:
    branches: [main, master, experiment/**]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests + Typecheck (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: ['20.x']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Unit tests (main-process + legacy)
        run: npm test
        env:
          # Tests share globals; suppress noisy main-process logs
          NODE_NO_WARNINGS: '1'

      - name: Renderer tests (Vitest + Testing Library)
        run: npm run test:renderer

      - name: Editor stability gate
        run: npm run gate:editor
        continue-on-error: true  # advisory until stable in CI

  build-renderer:
    name: Build renderer (Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Vite build
        run: npm run build:renderer

      - name: Upload renderer bundle
        uses: actions/upload-artifact@v4
        with:
          name: renderer-${{ github.sha }}
          path: dist/renderer/
          retention-days: 7
          if-no-files-found: error
