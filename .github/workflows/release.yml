name: Release

# Build Windows and Fedora-beta Linux Tauri bundles for v* tags, then attach the
# artifacts to a GitHub Release. Linux is published as prerelease/beta material:
# Fedora live validation still happens manually from the generated .rpm.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Build Tauri bundle (NSIS installer)
        run: npm run build
        env:
          ACADEMIQ_SKIP_SIGN: "1"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Validate Windows bundle
        run: node scripts/tauri-bundle-gate.js
        env:
          ACADEMIQ_SKIP_SIGN: "1"

      - name: Prepare Windows release files
        shell: pwsh
        run: |
          Copy-Item -LiteralPath dist/tauri/latest.json -Destination dist/tauri/latest-windows.json
          Copy-Item -LiteralPath dist/tauri/SHA256SUMS.txt -Destination dist/tauri/SHA256SUMS-windows.txt

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-tauri
          if-no-files-found: error
          path: |
            dist/tauri/*.exe
            dist/tauri/*.exe.sig
            dist/tauri/latest-windows.json
            dist/tauri/SHA256SUMS-windows.txt

  build-linux:
    name: Build Fedora beta Linux bundles
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm \
            wget

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install sidecar dependencies
        run: npm ci --no-audit --no-fund
        working-directory: src-sidecar/capture-agent

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Fetch Linux PDFium runtime
        run: |
          curl -L --retry 3 -o /tmp/pdfium-linux-x64.tgz \
            https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-linux-x64.tgz
          mkdir -p /tmp/pdfium-linux-x64
          tar -xzf /tmp/pdfium-linux-x64.tgz -C /tmp/pdfium-linux-x64
          cp "$(find /tmp/pdfium-linux-x64 -name libpdfium.so -print -quit)" src-tauri/binaries/libpdfium.so

      - name: Build Linux capture sidecar
        run: |
          node scripts/build-sidecar.js
          chmod +x src-tauri/binaries/capture-agent-x86_64-unknown-linux-gnu

      - name: Configure Linux bundle targets
        run: node scripts/configure-tauri-linux.js
        env:
          ACADEMIQ_TAURI_BUNDLES: rpm,appimage

      - name: Build Tauri bundles (RPM + AppImage)
        run: npm run build
        env:
          ACADEMIQ_SKIP_SIGN: "1"
          ACADEMIQ_TAURI_BUNDLES: rpm,appimage

      - name: Validate Linux bundle
        run: node scripts/tauri-bundle-gate.js
        env:
          ACADEMIQ_SKIP_SIGN: "1"
          ACADEMIQ_TAURI_BUNDLES: rpm,appimage

      - name: Prepare Linux release files
        run: |
          cp dist/tauri/latest.json dist/tauri/latest-linux.json
          cp dist/tauri/SHA256SUMS.txt dist/tauri/SHA256SUMS-linux.txt

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-tauri
          if-no-files-found: error
          path: |
            dist/tauri/*.rpm
            dist/tauri/*.AppImage
            dist/tauri/latest-linux.json
            dist/tauri/SHA256SUMS-linux.txt

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Attach artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          fail_on_unmatched_files: true
          files: release-assets/**/*
