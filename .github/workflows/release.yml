name: Release

# Build the Tauri NSIS installer and attach it to the GitHub Release whenever a
# version tag (v1.2.3) is pushed. Code signing is applied only when the signing
# secrets are configured; otherwise an unsigned installer is produced.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build installer + attach to release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build Tauri bundle (NSIS installer)
        run: npm run build
        env:
          # Optional code-signing — configure these repo secrets to produce a
          # signed installer. Without them the build still succeeds (unsigned).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Attach installer to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
          files: |
            dist/tauri/*.exe
            dist/tauri/*.exe.sig
            dist/tauri/latest.json
